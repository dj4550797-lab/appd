<!DOCTYPE html>
<!-- Perfected by Flixora AI - Premium Rebirth -->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flixora | {{file_name}}</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

    <style>
        :root {
            --primary: #22d3ee;
            --secondary: #a855f7;
            --dark-bg: #030712;
            --dark-card: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f9fafb;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }
        body {
            background: #000;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .cursor-dot { position: fixed; width: 12px; height: 12px; background: var(--primary); border-radius: 50%; pointer-events: none; z-index: 10000; box-shadow: 0 0 15px var(--primary); }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 4rem;
            background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }

        .nleft .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
            letter-spacing: 3px;
        }

        .nryt a { color: var(--text-dim); text-decoration: none; font-weight: 600; margin-left: 2rem; transition: 0.3s; }
        .nryt a:hover { color: var(--primary); }

        .outer { padding: 8rem 2rem 4rem; max-width: 1000px; margin: 0 auto; position: relative; z-index: 10; }
        
        .main-card {
            background: var(--dark-card);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 25px 100px rgba(0, 0, 0, 0.8);
            margin-bottom: 4rem;
        }

        .file-name { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; margin: 2rem 0; line-height: 1.4; color: #fff; }
        
        .player-container { border-radius: 24px; overflow: hidden; border: 1px solid var(--glass-border); margin-bottom: 2.5rem; }

        .actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; }
        .btn {
            padding: 1rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
        }
        .btn:hover { background: var(--primary); color: #000; transform: translateY(-5px); }
        .btn img { width: 20px; }
        .btn.primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; grid-column: 1 / -1; font-size: 1.1rem; }

        /* Sections */
        .sec { padding: 4rem 2rem; background: rgba(255, 255, 255, 0.02); border-radius: 32px; margin-bottom: 2rem; border: 1px solid var(--glass-border); }
        .sec h2 { font-family: 'Orbitron', sans-serif; margin-bottom: 1.5rem; font-size: 1.8rem; color: var(--primary); }
        .sec p { color: var(--text-dim); line-height: 1.7; }

        footer { text-align: center; padding: 4rem 2rem; color: var(--text-dim); }
        footer a { color: var(--primary); text-decoration: none; font-weight: 700; }

        @media (max-width: 600px) {
            nav { padding: 1rem; }
            .nryt { display: none; }
            .main-card { padding: 1.5rem; }
            .file-name { font-size: 1.3rem; }
        }
    </style>
</head>

<body>
    <canvas id="bg-canvas"></canvas>
    <div class="cursor-dot"></div>

    <nav>
        <div class="nleft">
            <a href="https://t.me/Flixora" class="logo">FLIXORA</a>
        </div>
        <div class="nryt">
            <a href="#main">Home</a>
            <a href="#sec1">About</a>
        </div>
    </nav>

    <div class="outer">
        <div class="main-card" id="main">
            <h1 class="file-name">{{file_name}}</h1>

            <div class="player-container">
                <video id="player" playsinline controls>
                    <source src="{{file_url}}" type="video/mp4" />
                </video>
            </div>

            <div class="actions">
                <a href="{{file_url}}" download="{{file_name}}" class="btn primary">DOWNLOAD VIDEO</a>
                <button onclick="vlc_player()" class="btn"><img src="https://i.postimg.cc/15TQ4y7B/vlc.png">VLC</button>
                <button onclick="mx_player()" class="btn"><img src="https://i.postimg.cc/sx4Msv4T/mx.png">MX</button>
                <button onclick="playit_player()" class="btn"><img src="https://i.postimg.cc/RVGWYJFF/playit.png">PLAYIT</button>
                <button onclick="km_player()" class="btn"><img src="https://i.postimg.cc/wT9tFQ9Z/km.png">KM</button>
            </div>
        </div>

        <div id="sec1" class="sec">
            <h2>WELCOME</h2>
            <p>Welcome to our online streaming platform! We provide the best experience for your media files.</p>
        </div>

        <div id="sec2" class="sec">
            <h2>CHANNELS</h2>
            <div class="actions" style="margin-top: 1.5rem;">
                <button class="btn" onclick="window.open('https://t.me/Flixora')">Update Channel</button>
                <button class="btn" onclick="window.open('https://t.me/Flixora')">Request Group</button>
            </div>
        </div>

        <div id="sec4" class="sec">
            <h2>SUPPORT</h2>
            <p>Need help? Contact our team via Telegram anytime.</p>
            <div class="actions" style="margin-top: 1.5rem;">
                <button class="btn" onclick="window.open('https://t.me/Contact_Flixora_bot')">Contact Support</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 <a href="https://t.me/Flixora">Flixora</a>. Premium Experience.</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <script>
        const video = document.getElementById('player');
        const plyr = new Plyr('#player');
        
        // Background Animation
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [];

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<50; i++) {
                particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    r: Math.random() * 2 + 1,
                    dx: (Math.random() - 0.5) * 1,
                    dy: (Math.random() - 0.5) * 1
                });
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(0, 0, w, h);
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(34, 211, 238, 0.5)'; ctx.fill();
                p.x += p.dx; p.y += p.dy;
                if(p.x<0 || p.x>w) p.dx *= -1; if(p.y<0 || p.y>h) p.dy *= -1;
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init(); draw();

        // Rotation
        async function handleRotation() {
            if (document.fullscreenElement) {
                if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape').catch(e => {});
            } else if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
        }
        document.addEventListener('fullscreenchange', handleRotation);
        video.addEventListener('play', () => {
            if (window.innerWidth < 768) {
                if (video.requestFullscreen) video.requestFullscreen();
                else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
            }
        });

        // Cursor
        const dot = document.querySelector('.cursor-dot');
        window.addEventListener('mousemove', (e) => gsap.to(dot, { x: e.clientX - 6, y: e.clientY - 6, duration: 0.2 }));

        const videoUrl = "{{file_url}}";
        function vlc_player() { window.location.href = `vlc://${videoUrl.replace(/^https?:\/\//, "")}`; }
        function mx_player() { window.location.href = `intent:${videoUrl}#Intent;action=android.intent.action.VIEW;type=video/*;package=com.mxtech.videoplayer.ad;end`; }
        function playit_player() { window.location.href = `playit://playerv2/video?url=${videoUrl}`; }
        function km_player() { window.location.href = `intent:${videoUrl}#Intent;package=com.kmplayer;end`; }
    </script>
</body>
</html>
